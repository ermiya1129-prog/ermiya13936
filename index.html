<script>

let count =
Number(localStorage.getItem("salavatCount")) || 0;

let record =
Number(localStorage.getItem("salavatRecord")) || 0;

document.getElementById("count").innerText = count;
document.getElementById("record").innerText = record;

function addSalavat(){

count++;

if(count > record){
record = count;
localStorage.setItem("salavatRecord", record);
}

localStorage.setItem("salavatCount", count);

document.getElementById("count").innerText = count;
document.getElementById("record").innerText = record;
}

function minusSalavat(){

if(count > 0){
count--;
}

localStorage.setItem("salavatCount", count);

document.getElementById("count").innerText = count;
}

function resetCounter(){

count = 0;

localStorage.setItem("salavatCount", count);

document.getElementById("count").innerText = count;
}

</script>

السَّلامُ عَلَیْکَ یَا أَبا عَبْدِاللّٰهِ، السَّلامُ عَلَیْکَ یَا ابْنَ رَسُولِ اللّٰهِ، السَّلامُ عَلَیْکَ یا خِیَرَةَ اللّٰهِ وَابْنَ خِیرَتِهِ، السَّلامُ عَلَیْکَ یَا ابْنَ أَمِیرِ الْمُؤْمِنِینَ، وَابْنَ سَیِّدِ الْوَصِیِّینَ، اَلسَّلامُ عَلَیْکَ یَابْنَ فاطِمَةَ سَیِّدَةِ نِساءِ الْعالَمینَ، اَلسَّلامُ عَلَیْکَ یا ثارَ اللّهِ وَ ابْنَ ثارِه، وَ الْوِتْرَ الْمَوْتُورَ، اَلسَّلامُ عَلَیْکَ وَ عَلَى الْاَرْواحِ الَّتى حَلَّتْ بِفِنائِکَ، عَلَیْکُمْ مِنّى جَمیعًا سَلامُ اللّهِ اَبَدًا ما بَقیتُ وَ بَقِىَ اللَّیْلُ وَ النَّهارُ، یا اَبا عَبْدِ اللّهِ 1

لَقَدْ عَظُمَتِ الرَّزِیَّةُ، وَ جَلَّتْ وَ عَظُمَتِ الْمُصیبَةُ بِکَ عَلَیْنا وَ عَلى جَمیعِ اَهْلِ الْاِسْلامِ، وَ جَلَّتْ وَ عَظُمَتْ مُصیبَتُکَ فِى السَّماواتِ عَلى جَمیعِ اَهْلِ السَّماواتِ، فَلَعَنَ اللّهُ اُمَّةً اَسَّسَتْ اَساسَ الظُّلْمِ وَ الْجَوْرِ عَلَیْکُمْ اَهْلَ الْبَیْتِ، وَ لَعَنَ اللّهُ اُمَّةً دَفَعَتْکُمْ عَنْ مَقامِکُمْ، وَ اَزالَتْکُمْ عَنْ مَراتِبِکُمُ الَّتى رَتَّبَکُمُ اللّهُ فیها، وَ لَعَنَ اللّهُ اُمَّةً قَتَلَتْکُمْ، وَ لَعَنَ اللّهُ الْمُمَهِّدینَ لَهُمْ بِـالَّتمْکینِ مِنْ قِتالِکُمْ، بَرِئْتُ اِلَى اللّهِ وَ اِلَیْکُمْ مِنْهُمْ وَ مِنْ اَشْیاعِهِمْ وَ اَتْباعِهِمْ وَ اَوْلِیائِهِمْ. یا اَبا عَبْدِ اللّهِ 2

اِنّى سِلْمٌ لِمَنْ سالَمَکُمْ وَ حَرْبٌ لِمَنْ حارَبَکُمْ اِلى یَوْمِ الْقِیامَةِ، وَ لَعَنَ اللّهُ آلَ زیادٍ وَ آلَ مَرْوانَ، وَ لَعَنَ اللّهُ بَنى اُمَیَّةَ قاطِبَهً، وَ لَعَنَ اللّهُ ابْنَ مَرْجانَهَ، وَ لَعَنَ اللّهُ عُمَرَ بْنَ سَعْدٍ، وَ لَعَنَ اللّهُ شِمْراً، وَ لَعَنَ اللّهُ اُمَّةً اَسْرَجَتْ وَ اَلجَمَتْ وَ تَنَقَّبَتْ لِقِتالِکَ. بِاَبى اَنْتَ وَ اُمّى لَقَدْ عَظُمَ مُصابى بِکَ، فَاَسْاَلُ اللّهَ الَّذى اَکْرَمَ مَقامَکَ وَ اَکْرَمَنى بِکَ، اَنْ یَرْزُقَنى طَلَبَ ثارِکَ مَعَ اِمامٍ مَنْصُورٍ مِنْ اَهْلِ بَیْتِ مُحَمَّدٍ صَلَّى اللّهُ عَلَیْهِ وَ آلِه. اَللّهُمَّ اجْعَلْنى عِنْدَکَ وَجیهًا بِـالْحُسَیْنِ عَلَیْهِ السّلامُ فِى الدُّنْیا وَ الاْخِرَةِ. یا اَبا عَبْدِ اللّهِ 3اِنّى اَتَقَرَّبُ اِلَى اللّهِ وَ اِلى رَسُولِه وَ اِلى اَمیرِالْمُؤْمِنینَ، وَ اِلى فاطِمَةَ وَ اِلَى الْحَسَنِ وَ اِلَیْکَ بِمُوالاتِکَ، وَ بِالْبَرآئَةِ مِمَّنْ قاتَلَکَ وَ نَصَبَ لَکَ الْحَرْبَ، وَ بِالْبَرآئَةِ مِمَّنْ اَسَّسَ اَساسَ الظُّلْمِ وَ الْجَوْرِ عَلَیْکُمْ، وَ اَبْرَاُ اِلَى اللّهِ وَ اِلى رَسُولِه مِمَّنْ اَسَّسَ اَساسَ ذلِکَ، وَ بَنى عَلَیْهِ بُنْیانَهُ، وَ جَرى فى ظُلْمِه وَ جَوْرِه عَلَیْکُمْ وَ عَلى اَشْیاعِکُمْ 4

بَرِئْتُ اِلَى اللّهِ وَ اِلَیْکُمْ مِنْهُمْ، وَ اَتَقَرَّبُ اِلَى اللّهِ ثُمَّ اِلَیْکُمْ بِمُوالاتِکُمْ وَ مُوالاةِ وَلیِّکُمْ، وَ بِالْبَرآئَةِ مِنْ اَعْدائِکُمْ وَ النّاصِبینَ لَکُمُ الْحَرْبَ، وَ بِالْبَرآئَةِ مِنْ اَشْیاعِهِمْ وَ اَتْباعِهِمْ. اِنّى سِلْمٌ لِمَنْ سالَمَکُمْ وَ حَرْبٌ لِمَنْ حارَبَکُمْ، وَ وَلِىٌّ لِمَنْ والاکُمْ وَ عَدُوٌّ لِمَـنْ عـاداکُمْ، فَاَسْـاَلُ اللّهَ الَّذى اَکْرَمَنى بِمَعْرِفَتِکُمْ وَ مَعْرِفَةِ اَوْلِیائِکُمْ، وَ رَزَقَنِـى الْبَرائَـةِ مِنْ اَعْدائِکُـمْ، اَنْ یَجْعَلَنى مَعَکُمْ فِى الدُّنْیا وَ الاْخِرَةِ، وَ اَنْ یُثَبِّتَ لى عِنْدَکُمْ قَدَمَ صِدْقٍ فِى الدُّنْیا وَ الاْخِرَةِ 5

وَ اَسْاَلُهُ اَنْ یُبَلِّغَنِى الْمَقامَ الْمَحْمُودَ لَکُمْ عِنْدَ اللّهِ، وَ اَنْ یَرْزُقَنى طَلَبَ ثارى (ثارِکُمْ) مَعَ اِمامٍ هُدًى (مَهْدىٍّ) ظاهِرٍ ناطِقٍ بِـالْحَقِّ مِنْکُمْ، وَ اَسْاَلُ اللّهَ بِحَقِّکُمْ وَ بِالشَّأْنِ الَّذى لَکُمْ عِنْدَهُ، اَنْ یُعْطِیَنى بِمُصابى بِکُمْ اَفْضَلَ ما یُعْطى مُصابًا بِمُـصیبَتِه؛ مُصیبَةً ما اَعْظَمَها وَ اَعْظَمَ رَزِیَّتَها فِى الْاِسْلامِ وَ فى جَمیعِ السَّماواتِ وَ الْاَرْضِ. اَللّهُمَّ اجْعَلْنى فى مَقامى هذا مِمَّنْ تَنالُهُ مِنْکَ صَلَواتٌ وَ رَحْمَةٌ وَ مَغْفِرَةٌ. اَللّهُمَّ اجْعَلْ مَحْیاىَ مَحْیا مُحَمَّدٍ وَ آلِ مُحَمَّدٍ، وَ مَماتى مَماتَ مُحَمَّدٍ وَ آلِ مُحَمَّدٍ 6اَللّهُمَّ اِنَّ هذا یَوْمٌ تَبَرَّکَتْ بِه بَنُو اُمَیَّهَ، وَ ابْنُ آکِلَةِ الْاَ کْبادِ، اَللَّعینُ ابْنُ اللَّعینِ، عَلى لِسانِکَ وَ لِسانِ نَبِیِّکَ صَلَّى اللّهُ عَلَیْهِ وَ آلِه، فى کُلِّ مَوْطِنٍ وَ مَوْقِفٍ وَقَفَ فیهِ نَبِیُّکَ صَلَّى اللّهُ عَلَیْهِ وَ آلِه.اَللّهُمَّ الْعَنْ اَباسُفْیانَ وَ مُعاوِیَةَ وَ یَزیدَ بْنَ مُعاویَةَ، عَلَیْهِمْ مِنْکَ اللَّعْنَةُ اَبَدَ الاْبِدینَ، وَ هذا یَوْمٌ فَرِحَتْ بِه آلُ‌ زیادٍ وَ آلُ‌ مَرْوانَ بِقَتْلِهِمُ الْحُسَیْنَ صَلَواتُ اللّهِ عَلَیْهِ. اَللّهُمَّ فَضاعِفْ عَلَیْهِمُ اللَّعْنَ مِنْکَ وَ الْعَذابَ الاَلیمَ. اَللّهُمَّ اِنّى اَتَقَرَّبُ اِلَیْکَ فى هذَا الْیَوْمِ، وَ فى مَوْقِفى هذا، وَ اَیّامِ حَیاتى، بِـالْبَرائَةِ مِنْهُمْ وَ اللَّعْنَةِ عَلَیْهِـمْ، وَ بِـالْمُوالاةِ لِنَبِیِّکَ وَ آلِ نَبِیِّکَ عَلَیْهِ وَ عَلَیْهِمُ السَّلامُ 7

صد مرتبه می گویی : اَللّهُمَّ الْعَنْ اَوَّلَ ظالِمٍ ظَلَمَ حَقَّ مُحَمَّدٍ وَ آلِ مُحَمَّدٍ، وَ آخِرَ تابِعٍ لَهُ عَلى ذلِکَ. اَللّهُمَّ الْعَنِ الْعِصابَةَ الَّتى جاهَدَتِ الْحُسَیْنَ، وَ شایَعَتْ وَ بایَعَتْ وَ تابَعَتْ عَلى قَتْلِه. اَللّهُمَّ الْعَنْهُمْ جَمیعًا 8صد مرتبه می گویی : اَلسَّلامُ عَلَیْکَ یا اَبا عَبْدِ اللّهِ، وَ عَلَى الْاَرْواحِ الَّتى حَلَّتْ بِفِنائِکَ، عَلَیْکَ مِنّى سَلامُ اللّهِ اَبَدًا ما بَقیتُ وَ بَقِىَ اللَّیْلُ وَ النَّهارُ، وَ لا جَعَلَهُ اللّهُ آخِرَ الْعَهْدِ مِنّى لِزِیارَتِکُمْ.

اَلسَّلامُ عَلَى الْحُسَیْنِ وَ عَلى عَلىِّ بْنِ الْحُسَیْنِ وَ عَلى اَوْلادِ الْحُسَیْنِ وَ عَلى اَصْحابِ الْحُسَیْنِ

9
سپس می گویی : اَللّهُمَّ خُصَّ اَنْتَ اَوَّلَ ظالِمٍ بِاللَّعْنِ مِنّى، وَ ابْدَاْ بِه اَوَّلاً ثُمَّ الْعَنِ الثّانِىَ وَ الثّالِثَ وَ الرّابِعَ. اَللّهُمَّ الْعَنْ یَزیدَ خامِساً، وَ الْعَنْ عُبَیْدَ اللّهِ بْنَ زیادٍ وَ ابْنَ مَرْجانَهَ، وَ عُمَرَ بْنَ سَعْدٍ وَ شِمْراً، وَ آلَ اَبى سُفْیانَ وَ آلَ زیادٍ وَ آلَ مَرْوانَ اِلى یَوْمِ الْقِیامَةِ 10

در حالت سجده می گویی : اَللّهُمَّ لَکَ الْحَمْدُ حَمْدَ الشّاکِرینَ لَکَ عَلى مُصابِهِمْ، اَلحَمْدُ لِلّهِ عَلى عَظیمِ رَزِیَّتى. اَللّهُمَّ ارْزُقْنى شَفاعَةَ الْحُسَیْنِ یَوْمَ الْوُرُودِ، وَ ثَبِّتْ لى قَدَمَ صِدْقٍ عِنْدَکَ مَعَ الْحُسَیْنِ وَ اَصْحابِ الْحُسَیْنِ، اَلَّذینَ بَذَلُوا مُهَجَهُمْ دُونَ الْحُسَیْنِ عَلَیْهِ السَّلامُ 11

<script>

function toggleTheme(){

document.getElementById("themeBtn").innerHTML="🌙 حالت شب";
}else{
document.getElementById("themeBtn").innerHTML="☀️ حالت روز";
}

}

function searchText(){

let input=document.getElementById("searchBox").value.toLowerCase();

let text=document.getElementById("zeyaratText");

if(input.length>0){
text.innerHTML=text.innerHTML.replaceAll(
input,
"<mark>"+input+"</mark>"
);
}

}

function topFunction(){
window.scrollTo({
top:0,
behavior:"smooth"
});
}

</script>
